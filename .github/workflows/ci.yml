name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e . pytest ruff build
      - run: python -m pytest
      - run: ruff check .
      - run: python -m build
      - run: python -c "from lerobot.teleoperators.config import TeleoperatorConfig; import lerobot_teleoperator_galaxea_a1_so_leader; assert 'galaxea_a1_so_leader' in TeleoperatorConfig.get_known_choices()"
